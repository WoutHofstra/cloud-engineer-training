trigger: none

pr: none

schedules:
  - cron: "0 7 * * 6"
    displayName: Saturday deploy
    branches:
      include:
        - main
    always: true

pool:
  vmImage: ubuntu-latest

steps:
- checkout: self

- task: Bash@3
  inputs:
    targetType: inline
    script: |
      sudo apt-get update
      sudo apt-get install -y unzip curl

      TERRAFORM_VERSION="1.8.5"

      curl -LO https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip
      unzip terraform_${TERRAFORM_VERSION}_linux_amd64.zip
      sudo mv terraform /usr/local/bin/

      terraform version

- task: AzureCLI@2
  inputs:
    azureSubscription: 'azure-resource-manager-connection'
    scriptType: bash
    scriptLocation: inlineScript
    workingDirectory: $(System.DefaultWorkingDirectory)/project1-Azure-Lab
    inlineScript: |
      export ARM_USE_OIDC=true
      export ARM_CLIENT_ID="c7a31023-be2e-4b67-87b5-e9352393954a"
      export ARM_CLIENT_SECRET="d5377dbe-1ec5-44b1-a358-e522210a10a7"
      export ARM_TENANT_ID="1bc9e66a-c3fb-4425-8545-07709b9ec08a"
      export ARM_SUBSCRIPTION_ID="c0cb5abf-ecc9-4e0e-a06a-d63cf6c4f6cf"

      terraform init
      terraform plan
      terraform apply -auto-approve